<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>IoT Lab Gateway</title>
  <style>
    :root{
      --bg:#0b0b0f;
      --card:#14141b;
      --muted:#a6a6b3;
      --text:#f5f5f7;
      --border:rgba(255,255,255,.10);
      --shadow:0 18px 50px rgba(0,0,0,.45);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background:
        radial-gradient(1200px 800px at 20% 10%, rgba(160,140,255,.18), transparent 55%),
        radial-gradient(900px 700px at 85% 20%, rgba(80,210,255,.16), transparent 50%),
        radial-gradient(900px 700px at 50% 90%, rgba(255,140,200,.12), transparent 55%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
    }
    .shell{width:min(920px, 100%);}
    .top{
      display:flex;
      gap:14px;
      align-items:flex-end;
      justify-content:space-between;
      margin-bottom:18px;
    }
    .title{
      font-size:28px;
      font-weight:650;
      letter-spacing:-.02em;
      margin:0;
      line-height:1.1;
    }
    .subtitle{
      margin:6px 0 0 0;
      color:var(--muted);
      font-size:14px;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border:1px solid var(--border);
      border-radius:999px;
      background:rgba(255,255,255,.04);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      font-size:13px;
      color:var(--muted);
      white-space:nowrap;
    }
    .dot{
      width:8px;height:8px;border-radius:999px;
      background:#22c55e;
      box-shadow:0 0 0 4px rgba(34,197,94,.18);
    }
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .card-inner{padding:22px;}
    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
      margin-top:14px;
    }
    @media (max-width: 720px){
      .grid{grid-template-columns:1fr;}
      .top{flex-direction:column;align-items:flex-start;}
    }
    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-bottom:8px;
    }
    input{
      width:100%;
      padding:12px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(0,0,0,.25);
      color:var(--text);
      outline:none;
    }
    input:focus{
      border-color: rgba(120,170,255,.55);
      box-shadow: 0 0 0 4px rgba(120,170,255,.18);
    }
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }
    button{
      border:1px solid var(--border);
      background:rgba(255,255,255,.06);
      color:var(--text);
      padding:12px 14px;
      border-radius:14px;
      font-weight:600;
      cursor:pointer;
      transition: transform .06s ease, background .18s ease, border-color .18s ease;
    }
    button:hover{
      background:rgba(255,255,255,.10);
      border-color: rgba(255,255,255,.18);
    }
    button:active{transform:scale(.98)}
    .primary{
      background:linear-gradient(180deg, rgba(120,170,255,.40), rgba(120,170,255,.18));
      border-color: rgba(120,170,255,.55);
    }
    .primary:hover{
      background:linear-gradient(180deg, rgba(120,170,255,.50), rgba(120,170,255,.22));
    }
    .secondary{
      background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
    }
    .msg{
      margin-top:16px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--border);
      background:rgba(0,0,0,.22);
      color:var(--text);
      font-size:14px;
    }
    .footer{
      padding:14px 22px;
      border-top:1px solid var(--border);
      color:var(--muted);
      font-size:12px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    code{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size:12px;
      color:#d2d2de;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top">
      <div>
        <h1 class="title">IoT Lab Gateway</h1>
        <p class="subtitle">Prototype control panel (local gateway + audit logging)</p>
      </div>
      <div class="badge" title="Service running">
        <span class="dot"></span> Online • Flask • Port 5000
      </div>
    </div>

    <div class="card">
      <div class="card-inner">
        <form method="POST">
          <div class="grid">
            <div>
              <label for="username">Username</label>
              <input id="username" name="username" value="USER_A" autocomplete="off" />
            </div>
            <div>
              <label for="session_id">Session ID</label>
              <input id="session_id" name="session_id" value="session1" autocomplete="off" />
            </div>
          </div>

          <div class="actions">
            <button class="primary" name="command" value="ON">Turn LED On</button>
            <button class="secondary" name="command" value="OFF">Turn LED Off</button>
            <button name="command" value="STATUS">Check Status</button>
          </div>
        </form>

        {% if message %}
          <div class="msg"><b>Response:</b> {{ message }}</div>
        {% endif %}
      </div>

      <div class="footer">
        <div>Logs: <code>~/iot_lab/logs/actions.csv</code></div>
        <div>Device: <code>esp32_led_01</code></div>
      </div>
    </div>
  </div>
</body>
</html>
